           onmouseover='onMouseOverRandomBg(this)' onmouseleave='onMouseLeaveClearBg(this)'>

    <input id='email' type='text' placeholder='тттттт@ттттт.com'
           onmouseover='onMouseOverRandomBg(this)' onmouseleave='onMouseLeaveClearBg(this)'>
